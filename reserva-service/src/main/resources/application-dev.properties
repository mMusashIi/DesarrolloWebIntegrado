spring.datasource.url=jdbc:h2:mem:reservadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

server.port=8084

jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-production-32chars}
jwt.expiration=86400000

logging.level.com.backend.reserva_service=DEBUG
logging.level.org.springframework.security=DEBUG

app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:5173
app.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
