spring.application.name=pago-service
server.port=8085
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.max-http-request-header-size=16KB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=BuganvillaPagos;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

jwt.secret=${JWT_SECRET:mySuperSecretKeyForBuganvillaToursApplication2024SecurityWithSpringBoot3}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
logging.level.com.backend.pago_service=${LOG_LEVEL:INFO}

mercadopago.access-token=${MP_ACCESS_TOKEN:}
mercadopago.public-key=${MP_PUBLIC_KEY:}
mercadopago.back-url.success=${MP_BACK_URL_SUCCESS:http://localhost:4200/pago-exitoso}
mercadopago.back-url.failure=${MP_BACK_URL_FAILURE:http://localhost:4200/pago-fallido}
mercadopago.back-url.pending=${MP_BACK_URL_PENDING:http://localhost:4200/pago-pendiente}
mercadopago.notification-url=${MP_NOTIFICATION_URL:}

reserva.service.url=${RESERVA_SERVICE_URL:http://localhost:8084}
inventario.service.url=${INVENTARIO_SERVICE_URL:http://localhost:8083}
catalogo.service.url=${CATALOGO_SERVICE_URL:http://localhost:8082}
notificacion.service.url=${NOTIFICACION_SERVICE_URL:http://localhost:8086}
