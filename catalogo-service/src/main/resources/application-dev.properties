spring.datasource.url=jdbc:h2:mem:catalogodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

logging.level.com.backend.catalogo_service=DEBUG
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:8080,http://localhost:5173
jwt.secret=mySuperSecretKeyForBuganvillaToursApplication2024SecurityWithSpringBoot3
