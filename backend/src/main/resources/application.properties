# ============================================================
# CONFIGURACION PRINCIPAL — los valores sensibles se leen
# desde variables de entorno. Ver .env.example en la raiz.
# ============================================================

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=BuganvillaTours1;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:changeme-replace-with-a-256bit-secret-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${PORT:8080}

# CORS — lista de origenes permitidos separados por coma
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# Logging
logging.level.com.buganvilla.buganvillatours=${LOG_LEVEL:INFO}
