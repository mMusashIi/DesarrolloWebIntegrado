# ============================================================
# CONFIGURACION PRINCIPAL — los valores sensibles se leen
# desde variables de entorno. Ver .env.example en la raiz.
# ============================================================

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=BuganvillaTours1;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:changeme-replace-with-a-256bit-secret-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${PORT:8080}

# CORS — lista de origenes permitidos separados por coma
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# Logging
logging.level.com.buganvilla.buganvillatours=${LOG_LEVEL:INFO}

# apis.net.pe
apis.net.pe.base-url=https://api.apis.net.pe/v1
apis.net.pe.token=${APIS_NET_TOKEN:}

# Mercado Pago
mercadopago.access-token=${MP_ACCESS_TOKEN:}
mercadopago.public-key=${MP_PUBLIC_KEY:}
mercadopago.back-url.success=${MP_BACK_URL_SUCCESS:http://localhost:8080/api/mercadopago/pago-exitoso}
mercadopago.back-url.failure=${MP_BACK_URL_FAILURE:http://localhost:8080/api/mercadopago/pago-fallido}
mercadopago.back-url.pending=${MP_BACK_URL_PENDING:http://localhost:8080/api/mercadopago/pago-fallido}
mercadopago.notification-url=${MP_NOTIFICATION_URL:}

# WhatsApp Business Cloud API
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.provider=${WHATSAPP_PROVIDER:mock}
whatsapp.api-base-url=${WHATSAPP_API_BASE_URL:https://graph.facebook.com}
whatsapp.api-version=${WHATSAPP_API_VERSION:v18.0}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.default-language=${WHATSAPP_DEFAULT_LANGUAGE:es_ES}

# OpenWA (legado)
openwa.base-url=${OPENWA_BASE_URL:http://localhost:2785/api}
openwa.api-key=${OPENWA_API_KEY:}
