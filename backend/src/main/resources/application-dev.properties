# ============================================================
# PERFIL DEV - Base de datos H2 en memoria (sin SQL Server)
# Para activar: agregar --spring.profiles.active=dev al correr
# ============================================================

# H2 - Base de datos en memoria
spring.datasource.url=jdbc:h2:mem:buganvilladb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - H2 compatible
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (mismo que producción)
jwt.secret=mySuperSecretKeyForBuganvillaToursApplication2024SecurityWithSpringBoot3
jwt.expiration=86400000

# Logging
logging.level.com.buganvilla.buganvillatours=DEBUG
logging.level.org.springframework.security=DEBUG

