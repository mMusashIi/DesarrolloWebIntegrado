# ============================================================
# PERFIL DEV - Base de datos H2 en memoria (sin SQL Server)
# Para activar: --spring.profiles.active=dev
# ============================================================

# H2 - Base de datos en memoria
spring.datasource.url=jdbc:h2:mem:buganvilladb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - H2 compatible
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (secreto de desarrollo, NO usar en producción)
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-production-32chars}
jwt.expiration=86400000

# Logging
logging.level.com.buganvilla.buganvillatours=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS para desarrollo
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:5173

# ----------------------------------------
# INTEGRACIONES EXTERNAS — leer de env vars, fallback vacío en dev
# ----------------------------------------

# apis.net.pe
apis.net.pe.base-url=https://api.apis.net.pe/v1
apis.net.pe.token=${APIS_NET_TOKEN:}

# Mercado Pago
mercadopago.access-token=${MP_ACCESS_TOKEN:}
mercadopago.public-key=${MP_PUBLIC_KEY:}

# URLs de retorno tras el pago
mercadopago.back-url.success=${MP_BACK_URL_SUCCESS:http://localhost:4200/pago-exitoso}
mercadopago.back-url.failure=${MP_BACK_URL_FAILURE:http://localhost:4200/pago-fallido}
mercadopago.back-url.pending=${MP_BACK_URL_PENDING:http://localhost:4200/pago-pendiente}

# URL pública del webhook IPN (vacío en desarrollo)
mercadopago.notification-url=${MP_NOTIFICATION_URL:}

# WhatsApp (desactivado en dev)
whatsapp.enabled=false
whatsapp.provider=mock

# OpenWA (legado — desactivado en dev, reemplazado en fase 5)
openwa.base-url=${OPENWA_BASE_URL:http://localhost:2785/api}
openwa.api-key=${OPENWA_API_KEY:}
