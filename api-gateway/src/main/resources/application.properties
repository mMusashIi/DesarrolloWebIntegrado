spring.application.name=api-gateway
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.max-http-request-header-size=16KB

# Spring Cloud Gateway MVC routes
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**,/api/usuarios/**

spring.cloud.gateway.server.webmvc.routes[1].id=catalogo-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${CATALOGO_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/paquetes/**,/api/lugares/**

spring.cloud.gateway.server.webmvc.routes[2].id=inventario-service
spring.cloud.gateway.server.webmvc.routes[2].uri=${INVENTARIO_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/inventario/**

spring.cloud.gateway.server.webmvc.routes[3].id=reserva-service
spring.cloud.gateway.server.webmvc.routes[3].uri=${RESERVA_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/reservas/**

spring.cloud.gateway.server.webmvc.routes[4].id=pago-service
spring.cloud.gateway.server.webmvc.routes[4].uri=${PAGO_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/pagos/**,/api/mercadopago/**

spring.cloud.gateway.server.webmvc.routes[5].id=notificacion-service
spring.cloud.gateway.server.webmvc.routes[5].uri=${NOTIFICACION_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/whatsapp/**,/api/apis-net/**,/api/notificacion/**

spring.cloud.gateway.server.webmvc.routes[6].id=reporte-service
spring.cloud.gateway.server.webmvc.routes[6].uri=${REPORTE_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/api/reportes/**

jwt.secret=${JWT_SECRET:mySuperSecretKeyForBuganvillaToursApplication2024SecurityWithSpringBoot3}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:4200,http://localhost:3000}

# Quita Origin antes de llegar al microservicio para que solo el gateway
# agregue Access-Control-Allow-Origin (evita header duplicado)
spring.cloud.gateway.server.webmvc.default-filters[0]=RemoveRequestHeader=Origin

logging.level.com.backend.api_gateway=${LOG_LEVEL:INFO}
logging.level.org.springframework.cloud.gateway=INFO
