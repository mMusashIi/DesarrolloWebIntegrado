<div class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-bottom-0">
        <h5 class="modal-title fw-bold">Iniciar Sesión</h5>
        <button type="button" class="btn-close" (click)="close.emit()"></button>
      </div>
      <div class="modal-body p-4">
        @if (error()) {
          <div class="alert alert-danger">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ error() }}
          </div>
        }
        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo Electrónico</label>
            <input type="email" formControlName="email" class="form-control form-control-custom"
              [class.is-invalid]="emailCtrl.invalid && emailCtrl.touched"
              placeholder="tu@email.com">
            @if (emailCtrl.invalid && emailCtrl.touched) {
              <div class="invalid-feedback">Ingresa un email válido.</div>
            }
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" formControlName="password" class="form-control form-control-custom"
              [class.is-invalid]="passwordCtrl.invalid && passwordCtrl.touched"
              placeholder="Tu contraseña">
            @if (passwordCtrl.invalid && passwordCtrl.touched) {
              <div class="invalid-feedback">La contraseña es requerida.</div>
            }
          </div>
          <button type="submit" class="btn btn-primary-custom w-100 py-2" [disabled]="loading()">
            @if (loading()) { <span class="loading-spinner me-2"></span> }
            Ingresar
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-muted">¿No tienes cuenta?
            <span (click)="close.emit()" style="color: var(--primary-color); cursor: pointer; font-weight: bold; margin-left: 5px;">
              Regístrate
            </span>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
