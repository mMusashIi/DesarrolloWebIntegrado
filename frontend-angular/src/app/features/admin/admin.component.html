<div class="d-flex" style="min-height: calc(100vh - 56px);">
  <!-- Sidebar -->
  <nav class="admin-sidebar d-none d-md-flex flex-column p-3 text-white">
    <div class="text-center mb-4 mt-2">
      <h5 class="text-white">
        <i class="fas fa-mountain me-2"></i>Buganvilla Admin
      </h5>
      <small class="text-white-50">Panel de Control</small>
    </div>

    <ul class="nav nav-pills flex-column gap-1">
      <li class="nav-item">
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-tachometer-alt"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/paquetes" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-box"></i>Paquetes
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/inventario" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-calendar-alt"></i>Inventario
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/reservas" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-calendar-check"></i>Reservas
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/usuarios" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-users"></i>Usuarios
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/lugares" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-map-marker-alt"></i>Lugares
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/admin/reportes" routerLinkActive="active"
          class="nav-link text-white d-flex align-items-center gap-2">
          <i class="fas fa-chart-bar"></i>Reportes
        </a>
      </li>
    </ul>

    <hr class="my-4 border-light opacity-25">

    <ul class="nav flex-column">
      <li class="nav-item mb-2">
        <a routerLink="/" class="nav-link text-white home-link-admin d-flex align-items-center gap-2">
          <i class="fas fa-home"></i>Ir a la Web
        </a>
      </li>
    </ul>

    <div class="mt-auto px-2 pb-2">
      <small class="text-white-50">
        <i class="fas fa-info-circle me-1"></i>Sistema v1.0
      </small>
    </div>
  </nav>

  <!-- Main content -->
  <div class="flex-grow-1 p-4" style="background-color: var(--background-light); overflow-y: auto;">
    <router-outlet></router-outlet>
  </div>
</div>
