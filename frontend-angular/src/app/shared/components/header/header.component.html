<nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-custom">
  <div class="container">
    <a class="navbar-brand navbar-brand-custom" routerLink="/">
      <i class="fas fa-mountain text-primary-custom me-2"></i>
      Buganvilla Tours
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link nav-link-custom" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" routerLink="/paquetes" routerLinkActive="active">Paquetes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" routerLink="/contacto" routerLinkActive="active">Contacto</a>
        </li>
        @if (auth.isAdmin()) {
          <li class="nav-item">
            <a class="nav-link nav-link-custom fw-bold text-danger" routerLink="/admin" routerLinkActive="active">
              <i class="fas fa-user-cog me-1"></i>Admin
            </a>
          </li>
        }
      </ul>

      <div class="d-flex align-items-center gap-2 ms-lg-3">
        @if (auth.isAuthenticated()) {
          <div class="dropdown">
            <button class="btn btn-outline-primary-custom dropdown-toggle"
              type="button" data-bs-toggle="dropdown">
              <i class="fas fa-user-check me-2"></i>
              Hola, {{ auth.currentUser()?.nombre?.split(' ')?.[0] || 'Usuario' }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
              <li><span class="dropdown-item-text text-muted small">
                <i class="fas fa-envelope me-2"></i>{{ auth.currentUser()?.email }}
              </span></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item" (click)="showProfileModal.set(true)">
                  <i class="fas fa-user-edit me-2 text-primary-custom"></i>Editar perfil y celular
                </button>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/reservas">
                  <i class="fas fa-suitcase me-2 text-primary-custom"></i>Mis compras
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item text-danger" (click)="auth.logout()">
                  <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                </button>
              </li>
            </ul>
          </div>
        } @else {
          <button class="btn btn-outline-primary-custom" (click)="openLogin()">
            <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
          </button>
          <button class="btn btn-primary-custom" (click)="openRegister()">
            <i class="fas fa-user-plus me-2"></i>Registrarse
          </button>
        }
      </div>
    </div>
  </div>
</nav>

@if (showLoginModal()) {
  <app-login-modal (close)="closeLogin()" (success)="onLoginSuccess()"></app-login-modal>
}

@if (showRegisterModal()) {
  <app-register-modal (close)="closeRegister()" (success)="onRegisterSuccess()"></app-register-modal>
}

@if (showProfileModal()) {
  <app-profile-modal (close)="showProfileModal.set(false)"></app-profile-modal>
}
