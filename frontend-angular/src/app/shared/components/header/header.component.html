<nav class="navbar navbar-expand-lg navbar-light bg-white" style="box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px 0;">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" routerLink="/" style="color: var(--primary-color);">
      🌸 Buganvilla Tours
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link fw-500" style="color: #1f2937;" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-500" style="color: #1f2937;" routerLink="/paquetes" routerLinkActive="active">Paquetes</a>
        </li>
        @if (auth.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link fw-500" style="color: #1f2937;" routerLink="/reservas" routerLinkActive="active">Reservar</a>
          </li>
        }
        <li class="nav-item">
          <a class="nav-link fw-500" style="color: #1f2937;" routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-500" style="color: #1f2937;" routerLink="/contacto" routerLinkActive="active">Contacto</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2">
        @if (auth.isAuthenticated()) {
          @if (auth.isAdmin()) {
            <a routerLink="/admin" class="btn btn-sm btn-warning fw-bold">
              Panel Admin
            </a>
          }
          <div class="dropdown">
            <button class="btn btn-sm fw-bold dropdown-toggle"
              style="background: white; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 50px; padding: 8px 20px;"
              type="button" data-bs-toggle="dropdown">
              {{ auth.currentUser()?.nombre }} {{ auth.currentUser()?.apellido }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><span class="dropdown-item-text text-muted small">{{ auth.currentUser()?.email }}</span></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item text-danger" (click)="auth.logout()">
                  Cerrar sesión
                </button>
              </li>
            </ul>
          </div>
        } @else {
          <button class="btn btn-sm fw-bold" (click)="openLogin()"
            style="background: white; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 50px; padding: 8px 20px;">
            Iniciar sesión
          </button>
          <button class="btn btn-sm fw-bold" (click)="openRegister()"
            style="background-color: var(--primary-color); color: white; border-radius: 50px; padding: 8px 20px; border: none;">
            Registrarse
          </button>
        }
      </div>
    </div>
  </div>
</nav>

@if (showLoginModal()) {
  <app-login-modal (close)="closeLogin()" (success)="onLoginSuccess()"></app-login-modal>
}

@if (showRegisterModal()) {
  <app-register-modal (close)="closeRegister()" (success)="onRegisterSuccess()"></app-register-modal>
}
