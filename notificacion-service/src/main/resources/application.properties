spring.application.name=notificacion-service
server.port=8086
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.max-http-request-header-size=16KB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

jwt.secret=${JWT_SECRET:mySuperSecretKeyForBuganvillaToursApplication2024SecurityWithSpringBoot3}

# WhatsApp Business Cloud API
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.provider=${WHATSAPP_PROVIDER:mock}
whatsapp.api-base-url=${WHATSAPP_API_BASE_URL:https://graph.facebook.com}
whatsapp.api-version=${WHATSAPP_API_VERSION:v25.0}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.default-language=${WHATSAPP_DEFAULT_LANGUAGE:es_ES}

# apis.net.pe
apis.net.pe.base-url=${APIS_NET_BASE_URL:https://api.decolecta.com/v1}
apis.net.pe.token=${APIS_NET_TOKEN:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:8080}
app.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
logging.level.com.backend.notificacion_service=${LOG_LEVEL:INFO}
